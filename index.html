<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>FIELD MEMO</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans+JP:wght@300;400;500;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>
<style>
  :root {
    --bg:#0a0a0a;--surface:#141414;--surface2:#1e1e1e;
    --border:#2a2a2a;--accent:#e8ff00;--accent2:#ff6b35;
    --text:#f0f0f0;--text-dim:#666;--text-mid:#999;
    --danger:#ff4444;--rec:#ff3b30;--green:#30d158;
    --radius:16px;--radius-sm:10px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans JP',sans-serif;min-height:100dvh;overflow-x:hidden;padding-bottom:env(safe-area-inset-bottom,20px);}

  /* SYNC BAR */
  .sync-bar{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;align-items:center;gap:8px;font-size:11px;font-family:'JetBrains Mono',monospace;}
  .sync-dot{width:7px;height:7px;border-radius:50%;background:var(--text-dim);flex-shrink:0;transition:background .3s;}
  .sync-dot.synced{background:var(--green);}
  .sync-dot.syncing{background:var(--accent);animation:blink .8s infinite;}
  .sync-dot.error{background:var(--danger);}
  .sync-dot.local{background:var(--accent2);}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
  .sync-text{color:var(--text-mid);flex:1;}
  .sync-btn{background:none;border:1px solid var(--border);color:var(--text-mid);font-size:11px;padding:3px 10px;border-radius:100px;cursor:pointer;font-family:'JetBrains Mono',monospace;transition:all .15s;}
  .sync-btn.connect{border-color:var(--accent);color:var(--accent);}
  .sync-btn:active{background:var(--surface2);}

  /* HEADER */
  .header{position:sticky;top:0;z-index:100;background:rgba(10,10,10,.95);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 20px;display:flex;align-items:center;justify-content:space-between;}
  .logo{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:3px;color:var(--accent);line-height:1;}
  .logo span{color:var(--text-dim);font-size:10px;letter-spacing:2px;display:block;font-family:'JetBrains Mono',monospace;margin-top:1px;}
  .btn-icon{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--surface);color:var(--text);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .15s;}
  .btn-icon:active{transform:scale(.92);background:var(--surface2);}

  /* VIEW SWITCH */
  .view-switch{display:flex;background:var(--surface);border-radius:100px;padding:3px;margin:12px 20px 0;}
  .tab-btn{flex:1;padding:8px 12px;border-radius:100px;border:none;background:transparent;color:var(--text-dim);font-family:'Noto Sans JP',sans-serif;font-size:13px;font-weight:500;cursor:pointer;transition:all .2s;}
  .tab-btn.active{background:var(--accent);color:#000;font-weight:700;}

  /* INPUT */
  .new-memo-area{padding:16px 20px;border-bottom:1px solid var(--border);}
  .input-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;transition:border-color .2s;}
  .input-card:focus-within{border-color:var(--accent);}
  .memo-textarea{width:100%;min-height:80px;background:transparent;border:none;outline:none;padding:16px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:15px;line-height:1.6;resize:none;}
  .memo-textarea::placeholder{color:var(--text-dim);}
  .attachments-preview{display:flex;gap:8px;padding:0 12px 12px;flex-wrap:wrap;}
  .attach-thumb{position:relative;width:72px;height:72px;border-radius:10px;overflow:hidden;border:1px solid var(--border);}
  .attach-thumb img{width:100%;height:100%;object-fit:cover;}
  .attach-thumb .remove-btn{position:absolute;top:3px;right:3px;width:20px;height:20px;background:rgba(0,0,0,.75);border-radius:50%;border:none;color:white;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
  .audio-preview{display:flex;align-items:center;gap:10px;padding:10px 14px;background:rgba(232,255,0,.06);border-radius:10px;border:1px solid rgba(232,255,0,.2);font-size:13px;color:var(--accent);width:100%;}
  .audio-preview .duration{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--text-mid);margin-left:auto;}
  .rec-indicator{display:none;align-items:center;gap:8px;padding:10px 16px;background:rgba(255,59,48,.1);border-top:1px solid rgba(255,59,48,.3);font-size:13px;color:var(--rec);}
  .rec-indicator.visible{display:flex;}
  .rec-dot{width:8px;height:8px;background:var(--rec);border-radius:50%;animation:blink 1s infinite;}
  .rec-timer{font-family:'JetBrains Mono',monospace;font-weight:600;font-size:14px;}
  .stop-rec-btn{margin-left:auto;padding:5px 14px;background:var(--rec);color:white;border:none;border-radius:100px;font-size:12px;font-weight:700;cursor:pointer;}
  .tag-row{display:flex;align-items:center;gap:8px;padding:8px 16px;border-top:1px solid var(--border);overflow-x:auto;}
  .quick-tag{white-space:nowrap;padding:5px 12px;border-radius:100px;border:1px solid var(--border);background:transparent;color:var(--text-mid);font-size:12px;cursor:pointer;transition:all .15s;font-family:'Noto Sans JP',sans-serif;}
  .quick-tag.selected{background:rgba(232,255,0,.12);border-color:var(--accent);color:var(--accent);}
  .input-toolbar{display:flex;align-items:center;padding:8px 12px;border-top:1px solid var(--border);gap:4px;}
  .tool-btn{width:38px;height:38px;border-radius:var(--radius-sm);border:none;background:transparent;color:var(--text-mid);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
  .tool-btn:active,.tool-btn.active-tool{background:var(--surface2);color:var(--accent);}
  .tool-btn.recording{color:var(--rec);animation:blink 1s infinite;}
  .spacer{flex:1;}
  .submit-btn{height:38px;padding:0 18px;background:var(--accent);color:#000;border:none;border-radius:100px;font-family:'Noto Sans JP',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .15s;}
  .submit-btn:active{transform:scale(.95);}

  /* LIST */
  .search-bar{padding:12px 20px;border-bottom:1px solid var(--border);}
  .search-input-wrap{display:flex;align-items:center;background:var(--surface);border-radius:12px;border:1px solid var(--border);padding:0 14px;gap:8px;transition:border-color .2s;}
  .search-input-wrap:focus-within{border-color:var(--accent);}
  .search-input{flex:1;background:transparent;border:none;outline:none;height:42px;color:var(--text);font-family:'Noto Sans JP',sans-serif;font-size:14px;}
  .search-input::placeholder{color:var(--text-dim);}
  .memo-list{padding:16px 20px;display:flex;flex-direction:column;gap:12px;}
  .memo-card{background:var(--surface);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden;animation:slide-in .25s ease;}
  @keyframes slide-in{from{opacity:0;transform:translateY(-10px)}to{opacity:1;transform:translateY(0)}}
  .memo-header{display:flex;align-items:center;padding:12px 14px 8px;gap:8px;}
  .memo-type-icon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:14px;flex-shrink:0;}
  .type-text{background:rgba(232,255,0,.12)}.type-audio{background:rgba(255,107,53,.15)}.type-photo{background:rgba(48,209,88,.12)}.type-mixed{background:rgba(100,100,255,.12)}
  .memo-meta{flex:1;min-width:0;}
  .memo-time{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--text-dim);display:block;}
  .memo-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:2px;}
  .tag-chip{font-size:10px;padding:2px 7px;border-radius:100px;background:rgba(232,255,0,.1);color:var(--accent);border:1px solid rgba(232,255,0,.2);}
  .memo-actions{display:flex;gap:4px;}
  .action-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--text-dim);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:15px;transition:all .15s;}
  .action-btn:active{background:var(--surface2);}
  .memo-body{padding:0 14px 14px;}
  .memo-text{font-size:14px;line-height:1.65;color:var(--text);white-space:pre-wrap;word-break:break-word;}
  .memo-text.collapsed{display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
  .expand-btn{font-size:12px;color:var(--accent);background:none;border:none;cursor:pointer;padding:4px 0;font-family:'Noto Sans JP',sans-serif;}
  .audio-player{margin-top:10px;background:var(--surface2);border-radius:10px;padding:10px 12px;display:flex;align-items:center;gap:10px;}
  .play-btn{width:34px;height:34px;border-radius:50%;background:var(--accent2);border:none;color:white;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:transform .15s;}
  .play-btn:active{transform:scale(.9);}
  .audio-progress-wrap{flex:1;display:flex;flex-direction:column;gap:4px;}
  .audio-progress{-webkit-appearance:none;width:100%;height:3px;background:var(--border);border-radius:100px;outline:none;cursor:pointer;}
  .audio-progress::-webkit-slider-thumb{-webkit-appearance:none;width:12px;height:12px;background:var(--accent2);border-radius:50%;}
  .audio-time{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--text-dim);display:flex;justify-content:space-between;}
  .photo-grid{display:grid;gap:6px;margin-top:10px;}
  .photo-grid.count-1{grid-template-columns:1fr}.photo-grid.count-2{grid-template-columns:1fr 1fr}.photo-grid.count-3{grid-template-columns:1fr 1fr}.photo-grid.count-3 .photo-item:first-child{grid-column:1/-1}.photo-grid.count-4{grid-template-columns:1fr 1fr}
  .photo-item{border-radius:10px;overflow:hidden;aspect-ratio:4/3;cursor:pointer;}
  .photo-item img{width:100%;height:100%;object-fit:cover;}
  .empty-state{text-align:center;padding:60px 30px;color:var(--text-dim);}
  .empty-icon{font-size:48px;margin-bottom:12px;opacity:.4;}
  .empty-text{font-size:14px;line-height:1.6;}
  .date-sep{display:flex;align-items:center;gap:10px;margin:6px 0;}
  .date-sep-line{flex:1;height:1px;background:var(--border);}
  .date-sep-text{font-size:11px;color:var(--text-dim);font-family:'JetBrains Mono',monospace;white-space:nowrap;}

  /* PHOTO VIEWER */
  .photo-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:1000;align-items:center;justify-content:center;padding:20px;}
  .photo-viewer.visible{display:flex;}
  .photo-viewer img{max-width:100%;max-height:100%;border-radius:12px;object-fit:contain;}
  .close-viewer{position:fixed;top:20px;right:20px;width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.1);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(10px);}

  /* AUTH OVERLAY */
  .auth-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.88);z-index:500;align-items:center;justify-content:center;padding:30px;}
  .auth-overlay.visible{display:flex;}
  .auth-card{background:var(--surface);border-radius:20px;border:1px solid var(--border);padding:30px 24px;max-width:360px;width:100%;text-align:center;}
  .auth-icon{font-size:48px;margin-bottom:16px;}
  .auth-title{font-family:'Bebas Neue',sans-serif;font-size:24px;letter-spacing:2px;color:var(--accent);margin-bottom:8px;}
  .auth-desc{font-size:13px;color:var(--text-mid);line-height:1.6;margin-bottom:24px;}
  .google-btn{width:100%;padding:14px;background:white;color:#333;border:none;border-radius:12px;font-size:15px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:10px;transition:all .15s;margin-bottom:12px;font-family:'Noto Sans JP',sans-serif;}
  .google-btn:active{transform:scale(.97);}
  .skip-btn{background:none;border:1px solid var(--border);color:var(--text-dim);padding:12px;border-radius:12px;width:100%;font-size:13px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;transition:all .15s;}
  .skip-btn:active{background:var(--surface2);color:var(--text);}

  /* TOAST */
  .toast{position:fixed;bottom:calc(20px + env(safe-area-inset-bottom,0px));left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:12px 20px;border-radius:100px;font-size:13px;z-index:999;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;text-align:center;}
  .toast.show{transform:translateX(-50%) translateY(0);}

  #photoInput{display:none;}
  ::-webkit-scrollbar{display:none;}
</style>
</head>
<body>

<!-- Auth Overlay -->
<div class="auth-overlay" id="authOverlay">
  <div class="auth-card">
    <div class="auth-icon">☁️</div>
    <div class="auth-title">CLOUD SYNC</div>
    <div class="auth-desc">Googleアカウントと連携すると、PCとスマホ間でメモが自動同期されます。</div>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg width="18" height="18" viewBox="0 0 18 18"><path d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844c-.209 1.125-.843 2.078-1.796 2.717v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/><path d="M9 18c2.43 0 4.467-.806 5.956-2.184l-2.908-2.258c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/><path d="M3.964 10.707A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.707V4.961H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.039l3.007-2.332z" fill="#FBBC05"/><path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.961L3.964 7.293C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/></svg>
      Googleでサインイン
    </button>
    <button class="skip-btn" onclick="skipSync()">このデバイスだけで使う（同期なし）</button>
  </div>
</div>

<!-- Sync Bar -->
<div class="sync-bar">
  <div class="sync-dot local" id="syncDot"></div>
  <span class="sync-text" id="syncText">ローカルモード</span>
  <button class="sync-btn connect" id="syncActionBtn" onclick="showAuth()">接続する</button>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">FIELD MEMO<span>QUICK CAPTURE</span></div>
  <div style="display:flex;gap:8px;">
    <button class="btn-icon" id="exportBtn">⬇</button>
    <button class="btn-icon" id="signOutBtn" style="display:none;font-size:13px;" onclick="signOut()">ログアウト</button>
  </div>
</div>

<!-- View Switch -->
<div style="padding:0;">
  <div class="view-switch">
    <button class="tab-btn active" onclick="switchView('new')">＋ 新規</button>
    <button class="tab-btn" onclick="switchView('list')">📋 一覧</button>
  </div>
</div>

<!-- New Memo View -->
<div id="newView">
  <div class="new-memo-area">
    <div class="input-card">
      <textarea class="memo-textarea" id="memoText" placeholder="メモを入力…&#10;（現場の状況・アイデア・気づきなど）" rows="3"></textarea>
      <div class="attachments-preview" id="attachmentsPreview"></div>
      <div class="rec-indicator" id="recIndicator">
        <div class="rec-dot"></div>
        <span class="rec-timer" id="recTimer">00:00</span>
        <span style="font-size:12px;color:var(--text-mid);">録音中...</span>
        <button class="stop-rec-btn" onclick="stopRecording()">停止</button>
      </div>
      <div class="tag-row">
        <span style="font-size:11px;color:var(--text-dim);white-space:nowrap;">タグ:</span>
        <button class="quick-tag" onclick="toggleTag(this,'現場')">🏗 現場</button>
        <button class="quick-tag" onclick="toggleTag(this,'アイデア')">💡 アイデア</button>
        <button class="quick-tag" onclick="toggleTag(this,'機材')">📦 機材</button>
        <button class="quick-tag" onclick="toggleTag(this,'クライアント')">🤝 クライアント</button>
        <button class="quick-tag" onclick="toggleTag(this,'TODO')">✅ TODO</button>
        <button class="quick-tag" onclick="toggleTag(this,'問題')">⚠️ 問題</button>
      </div>
      <div class="input-toolbar">
        <button class="tool-btn" id="micBtn" onclick="toggleRecording()">🎙</button>
        <button class="tool-btn" onclick="document.getElementById('photoInput').click()">📷</button>
        <input type="file" id="photoInput" accept="image/*" multiple onchange="handlePhotos(event)">
        <div class="spacer"></div>
        <button class="submit-btn" onclick="saveMemo()">保存</button>
      </div>
    </div>
  </div>
</div>

<!-- List View -->
<div id="listView" style="display:none;">
  <div class="search-bar">
    <div class="search-input-wrap">
      <span style="color:var(--text-dim);font-size:16px;">🔍</span>
      <input type="text" class="search-input" id="searchInput" placeholder="メモを検索…" oninput="renderList()">
    </div>
  </div>
  <div class="memo-list" id="memoList"></div>
</div>

<!-- Photo Viewer -->
<div class="photo-viewer" id="photoViewer" onclick="closeViewer()">
  <button class="close-viewer" onclick="closeViewer()">✕</button>
  <img id="viewerImg" src="" alt="">
</div>

<div class="toast" id="toast"></div>

<script>
// =============================
// Firebase 設定
// =============================
const firebaseConfig = {
  apiKey: "AIzaSyBsgawXLm_r-k9zdxjdUKS91JoNZAm00mk",
  authDomain: "field-memo.firebaseapp.com",
  databaseURL: "https://field-memo-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "field-memo",
  storageBucket: "field-memo.firebasestorage.app",
  messagingSenderId: "951797265473",
  appId: "1:951797265473:web:7b7f5d7f735e110a9bc2c0",
  measurementId: "G-48NQZRQGJ4"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.database();

// =============================
// 状態
// =============================
let memos = JSON.parse(localStorage.getItem('fieldmemos') || '[]');
let pendingPhotos = [], pendingAudio = null, selectedTags = [];
let mediaRecorder = null, audioChunks = [], recTimerInterval = null, recSeconds = 0;
let audioElements = {};
let currentUser = null;
let dbRef = null;

function saveLocal() { localStorage.setItem('fieldmemos', JSON.stringify(memos)); }

// =============================
// Firebase Auth
// =============================
function showAuth() { document.getElementById('authOverlay').classList.add('visible'); }
function skipSync() {
  document.getElementById('authOverlay').classList.remove('visible');
  localStorage.setItem('fieldmemo_skipped','1');
  updateSyncUI('local','ローカルモード（同期なし）');
}

function signInWithGoogle() {
  const provider = new firebase.auth.GoogleAuthProvider();
  // リダイレクト方式（スマホ対応）
  auth.signInWithRedirect(provider).catch(e => {
    console.error(e);
    showToast('❌ サインインエラー: ' + e.message);
  });
}

function signOut() {
  auth.signOut();
  currentUser = null;
  dbRef = null;
  document.getElementById('signOutBtn').style.display = 'none';
  updateSyncUI('local','ローカルモード');
  showToast('サインアウトしました');
}

// リダイレクト後の結果を処理
auth.getRedirectResult().then(result => {
  if (result && result.user) {
    console.log('リダイレクトサインイン成功:', result.user.email);
  }
}).catch(e => {
  console.error('リダイレクトエラー:', e);
  showToast('❌ サインインエラー: ' + e.message);
});

auth.onAuthStateChanged(user => {
  document.getElementById('authOverlay').classList.remove('visible');
  if (user) {
    currentUser = user;
    document.getElementById('signOutBtn').style.display = 'flex';
    updateSyncUI('syncing','接続中...');
    initFirebaseSync(user.uid);
    const btn = document.getElementById('syncActionBtn');
    btn.textContent = '今すぐ同期';
    btn.classList.remove('connect');
    btn.onclick = () => loadFromFirebase(user.uid);
  } else {
    currentUser = null;
    document.getElementById('signOutBtn').style.display = 'none';
    if (!localStorage.getItem('fieldmemo_skipped')) {
      setTimeout(() => showAuth(), 800);
    } else {
      updateSyncUI('local','ローカルモード');
    }
  }
});

// =============================
// Firebase Realtime DB 同期
// =============================
function initFirebaseSync(uid) {
  dbRef = db.ref('users/' + uid + '/memos');

  // リアルタイム同期（他デバイスの変更を即反映）
  dbRef.on('value', snapshot => {
    const data = snapshot.val();
    if (data) {
      const remoteMemos = Object.values(data);
      // ローカルと統合（IDベースでマージ）
      const localIds = new Set(memos.map(m => m.id));
      const remoteOnly = remoteMemos.filter(m => !localIds.has(m.id));
      memos = [...memos, ...remoteOnly].sort((a,b) => b.id - a.id);
      saveLocal();
      if (document.getElementById('listView').style.display !== 'none') renderList();
    }
    updateSyncUI('synced', '同期済み · ' + currentUser.email);
  }, err => {
    console.error(err);
    updateSyncUI('error','同期エラー');
  });
}

function loadFromFirebase(uid) {
  if (!dbRef) return;
  updateSyncUI('syncing','同期中...');
  showToast('☁️ 同期しました');
}

async function saveToFirebase(memo) {
  if (!currentUser || !dbRef) return;
  try {
    await dbRef.child(String(memo.id)).set(memo);
  } catch(e) {
    console.error(e);
    showToast('❌ 保存失敗: ' + e.message);
  }
}

async function deleteFromFirebase(id) {
  if (!currentUser || !dbRef) return;
  try {
    await dbRef.child(String(id)).remove();
  } catch(e) { console.error(e); }
}

function updateSyncUI(status, text) {
  document.getElementById('syncDot').className = 'sync-dot ' + status;
  document.getElementById('syncText').textContent = text;
}

// =============================
// View
// =============================
function switchView(v) {
  document.getElementById('newView').style.display = v==='new'?'block':'none';
  document.getElementById('listView').style.display = v==='list'?'block':'none';
  document.querySelectorAll('.tab-btn').forEach((b,i)=>b.classList.toggle('active',(i===0&&v==='new')||(i===1&&v==='list')));
  if (v==='list') renderList();
}

// =============================
// Tags
// =============================
function toggleTag(el,tag) {
  const i=selectedTags.indexOf(tag);
  if(i>=0){selectedTags.splice(i,1);el.classList.remove('selected');}
  else{selectedTags.push(tag);el.classList.add('selected');}
}

// =============================
// Photos
// =============================
function handlePhotos(e) {
  Array.from(e.target.files).forEach(f=>{
    const r=new FileReader();
    r.onload=ev=>{pendingPhotos.push(ev.target.result);renderAttachments();};
    r.readAsDataURL(f);
  });
  e.target.value='';
}
function renderAttachments() {
  const c=document.getElementById('attachmentsPreview');
  c.innerHTML='';
  pendingPhotos.forEach((s,i)=>{
    const t=document.createElement('div');t.className='attach-thumb';
    t.innerHTML=`<img src="${s}"><button class="remove-btn" onclick="removePhoto(${i})">✕</button>`;
    c.appendChild(t);
  });
  if(pendingAudio){
    const ap=document.createElement('div');ap.className='audio-preview';
    ap.innerHTML=`🎙 音声メモ <span class="duration">${formatTime(pendingAudio.duration||0)}</span><button onclick="removePendingAudio()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:14px;margin-left:8px;">✕</button>`;
    c.appendChild(ap);
  }
}
function removePhoto(i){pendingPhotos.splice(i,1);renderAttachments();}
function removePendingAudio(){pendingAudio=null;renderAttachments();}

// =============================
// Recording
// =============================
async function toggleRecording(){if(mediaRecorder&&mediaRecorder.state==='recording')stopRecording();else startRecording();}
async function startRecording(){
  try{
    const stream=await navigator.mediaDevices.getUserMedia({audio:true});
    audioChunks=[];
    mediaRecorder=new MediaRecorder(stream);
    mediaRecorder.ondataavailable=e=>audioChunks.push(e.data);
    mediaRecorder.onstop=()=>{
      const blob=new Blob(audioChunks,{type:'audio/webm'});
      const r=new FileReader();
      r.onload=ev=>{pendingAudio={data:ev.target.result,duration:recSeconds};renderAttachments();};
      r.readAsDataURL(blob);
      stream.getTracks().forEach(t=>t.stop());
      clearInterval(recTimerInterval);
      document.getElementById('recIndicator').classList.remove('visible');
      document.getElementById('micBtn').classList.remove('recording');
      recSeconds=0;
    };
    mediaRecorder.start();recSeconds=0;
    document.getElementById('recIndicator').classList.add('visible');
    document.getElementById('micBtn').classList.add('recording');
    recTimerInterval=setInterval(()=>{recSeconds++;document.getElementById('recTimer').textContent=formatTime(recSeconds);},1000);
  }catch(e){showToast('マイクへのアクセスが必要です');}
}
function stopRecording(){if(mediaRecorder&&mediaRecorder.state!=='inactive')mediaRecorder.stop();}

// =============================
// Save Memo
// =============================
async function saveMemo(){
  const text=document.getElementById('memoText').value.trim();
  if(!text&&pendingPhotos.length===0&&!pendingAudio){showToast('内容を入力してください');return;}
  const memo={
    id:Date.now(),text,
    photos:[...pendingPhotos],
    audio:pendingAudio?{...pendingAudio}:null,
    tags:[...selectedTags],
    ts:new Date().toISOString()
  };
  if(memo.audio)memo.transcript='（音声メモ保存済み）';
  memos.unshift(memo);saveLocal();

  // リセット
  document.getElementById('memoText').value='';
  pendingPhotos=[];pendingAudio=null;selectedTags=[];
  document.querySelectorAll('.quick-tag').forEach(b=>b.classList.remove('selected'));
  document.getElementById('attachmentsPreview').innerHTML='';
  showToast('✅ 保存しました');
  switchView('list');

  // Firebase保存
  if(currentUser){
    updateSyncUI('syncing','保存中...');
    await saveToFirebase(memo);
    updateSyncUI('synced','同期済み · '+currentUser.email);
  }
}

// =============================
// Render List
// =============================
function renderList(){
  const q=(document.getElementById('searchInput')?.value||'').toLowerCase();
  const c=document.getElementById('memoList');c.innerHTML='';
  let filtered=memos.filter(m=>!q||(m.text&&m.text.toLowerCase().includes(q))||(m.tags&&m.tags.some(t=>t.toLowerCase().includes(q))));
  if(!filtered.length){
    c.innerHTML=`<div class="empty-state"><div class="empty-icon">📋</div><div class="empty-text">${q?'検索結果なし':'メモがまだありません<br>「＋ 新規」から追加してください'}</div></div>`;
    return;
  }
  let lastDate='';
  filtered.forEach(memo=>{
    const d=new Date(memo.ts);
    const ds=d.toLocaleDateString('ja-JP',{month:'long',day:'numeric',weekday:'short'});
    if(ds!==lastDate){
      const s=document.createElement('div');s.className='date-sep';
      s.innerHTML=`<div class="date-sep-line"></div><div class="date-sep-text">${ds}</div><div class="date-sep-line"></div>`;
      c.appendChild(s);lastDate=ds;
    }
    c.appendChild(createMemoCard(memo));
  });
}

function createMemoCard(memo){
  const card=document.createElement('div');card.className='memo-card';card.id=`memo-${memo.id}`;
  const d=new Date(memo.ts);
  const time=d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  let icon='📝',cls='type-text';
  if(memo.audio&&memo.photos&&memo.photos.length>0){icon='🌐';cls='type-mixed';}
  else if(memo.audio){icon='🎙';cls='type-audio';}
  else if(memo.photos&&memo.photos.length>0){icon='📷';cls='type-photo';}
  const tags=(memo.tags||[]).map(t=>`<span class="tag-chip">${t}</span>`).join('');
  const isLong=memo.text&&memo.text.length>120;
  let photos='';
  if(memo.photos&&memo.photos.length>0){
    const cnt=Math.min(memo.photos.length,4);
    photos=`<div class="photo-grid count-${cnt}">${memo.photos.slice(0,cnt).map(s=>`<div class="photo-item" onclick="openViewer('${s}')"><img src="${s}" loading="lazy"></div>`).join('')}</div>`;
  }
  let audio='';
  if(memo.audio){
    const dur=formatTime(memo.audio.duration||0);
    audio=`<div class="audio-player"><button class="play-btn" onclick="togglePlay(${memo.id})">▶</button><div class="audio-progress-wrap"><input type="range" class="audio-progress" id="prog-${memo.id}" value="0" min="0" max="100" oninput="seekAudio(${memo.id},this.value)"><div class="audio-time"><span id="cur-${memo.id}">0:00</span><span>${dur}</span></div></div></div>${memo.transcript?`<div style="margin-top:8px;padding:10px 12px;background:rgba(255,107,53,.07);border-radius:10px;border-left:2px solid var(--accent2);font-size:13px;color:var(--text-mid);">${memo.transcript}</div>`:''}`;
  }
  card.innerHTML=`<div class="memo-header"><div class="memo-type-icon ${cls}">${icon}</div><div class="memo-meta"><span class="memo-time">${time}</span><div class="memo-tags">${tags}</div></div><div class="memo-actions"><button class="action-btn" onclick="deleteMemo(${memo.id})">🗑</button></div></div><div class="memo-body">${memo.text?`<div class="memo-text${isLong?' collapsed':''}" id="txt-${memo.id}">${escapeHtml(memo.text)}</div>${isLong?`<button class="expand-btn" onclick="expandText(${memo.id})">続きを読む ▾</button>`:''}`:''}${photos}${audio}</div>`;
  return card;
}

function expandText(id){
  const el=document.getElementById(`txt-${id}`);el.classList.remove('collapsed');
  const nb=el.nextElementSibling;if(nb&&nb.classList.contains('expand-btn'))nb.remove();
}

// =============================
// Audio Player
// =============================
function togglePlay(id){
  const memo=memos.find(m=>m.id===id);if(!memo||!memo.audio)return;
  if(!audioElements[id]){
    audioElements[id]=new Audio(memo.audio.data);
    audioElements[id].ontimeupdate=()=>{
      const a=audioElements[id];const pct=a.duration?(a.currentTime/a.duration)*100:0;
      const p=document.getElementById(`prog-${id}`);const c=document.getElementById(`cur-${id}`);
      if(p)p.value=pct;if(c)c.textContent=formatTime(Math.floor(a.currentTime));
    };
    audioElements[id].onended=()=>{const b=document.querySelector(`#memo-${id} .play-btn`);if(b)b.textContent='▶';};
  }
  const a=audioElements[id];const btn=document.querySelector(`#memo-${id} .play-btn`);
  if(a.paused){
    Object.entries(audioElements).forEach(([k,au])=>{if(k!=id&&!au.paused){au.pause();const b=document.querySelector(`#memo-${k} .play-btn`);if(b)b.textContent='▶';}});
    a.play();if(btn)btn.textContent='⏸';
  }else{a.pause();if(btn)btn.textContent='▶';}
}
function seekAudio(id,val){const a=audioElements[id];if(a&&a.duration)a.currentTime=(val/100)*a.duration;}

// =============================
// Delete
// =============================
async function deleteMemo(id){
  memos=memos.filter(m=>m.id!==id);saveLocal();
  const card=document.getElementById(`memo-${id}`);
  if(card){card.style.opacity='0';card.style.transform='translateX(40px)';card.style.transition='all .25s';setTimeout(()=>renderList(),260);}
  showToast('🗑 削除しました');
  await deleteFromFirebase(id);
}

// =============================
// Photo Viewer
// =============================
function openViewer(src){document.getElementById('viewerImg').src=src;document.getElementById('photoViewer').classList.add('visible');document.body.style.overflow='hidden';}
function closeViewer(){document.getElementById('photoViewer').classList.remove('visible');document.body.style.overflow='';}

// =============================
// Export
// =============================
document.getElementById('exportBtn').onclick=()=>{
  if(!memos.length){showToast('メモがありません');return;}
  let md=`# FIELD MEMO\n${new Date().toLocaleString('ja-JP')}\n\n---\n\n`;
  memos.forEach(m=>{
    const d=new Date(m.ts);md+=`## ${d.toLocaleString('ja-JP')}\n`;
    if(m.tags&&m.tags.length)md+=`タグ: ${m.tags.join(' / ')}\n`;
    if(m.text)md+=`\n${m.text}\n`;
    if(m.audio)md+=`\n🎙 音声 (${formatTime(m.audio.duration||0)})\n`;
    if(m.photos&&m.photos.length)md+=`📷 写真 ${m.photos.length}枚\n`;
    md+=`\n---\n\n`;
  });
  const a=document.createElement('a');
  a.href=URL.createObjectURL(new Blob([md],{type:'text/markdown'}));
  a.download=`fieldmemo_${new Date().toISOString().slice(0,10)}.md`;
  a.click();
  showToast('📄 エクスポートしました');
};

// =============================
// Utils
// =============================
function formatTime(s){return `${Math.floor(s/60)}:${String(s%60).padStart(2,'0')}`;}
function escapeHtml(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
function showToast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2500);
}
</script>
